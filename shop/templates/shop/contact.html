{% extends "shop/base.html" %}

{% block title %}Contact - Shanbe Bazaar{% endblock %}

{% block content %}
<section class="mb-4">
  <h1 class="mb-2">Contact Us</h1>
  <p class="text-secondary mb-0">
    Send us your message and we will reply soon.
  </p>
</section>

<section class="row">
  <div class="col-lg-7">
    <form class="card border-0 shadow-sm p-4">
      <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" id="name" type="text" placeholder="Your name" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" type="email" placeholder="you@example.com" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="message">Message</label>
        <textarea
          class="form-control"
          id="message"
          rows="4"
          placeholder="Write your message"
        ></textarea>
      </div>
      <button class="btn btn-dark" type="button">Send Message</button>
    </form>
  </div>
</section>
{% endblock %}
